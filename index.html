  :root{

    --crystal-fire:#e2673c;
    --crystal-wind:#5fbf7a;
    --crystal-earth:#b98a4f;
    --crystal-water:#5b9fd6;
    --crystal-thunder:#a874d1;
    --crystal-ice:#7fd8d6;
    --crystal-light:#e8d35f;
    --crystal-dark:#7561b0;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--ink); color:var(--parchment); font-family:'Noto Sans JP',sans-serif; }
  body{
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(201,161,90,0.10), transparent 60%),
      radial-gradient(ellipse 80% 50% at 90% 100%, rgba(91,159,214,0.08), transparent 60%),
      var(--ink);
    min-height:100vh;
  }
  .app{ max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  /* ---- Header ---- */
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, rgba(13,20,32,0.98) 70%, rgba(13,20,32,0));
    padding:16px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .title-row{ display:flex; align-items:baseline; gap:8px; margin-bottom:2px;}
  .crest{ width:20px; height:20px; flex:none; }
  h1{
    font-family:'Cinzel','Noto Serif JP',serif; font-weight:700;
    font-size:19px; letter-spacing:0.03em; color:var(--gold-bright); margin:0;
  }
  .sub{ font-size:11px; color:var(--dim); margin:0 0 12px; letter-spacing:0.04em; }

  .searchbar{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:9px 12px;
  }
  .searchbar svg{ flex:none; opacity:0.6; }
  .searchbar input{
    flex:1; background:none; border:none; outline:none; color:var(--parchment);
    font-size:14.5px; font-family:'Noto Sans JP',sans-serif;
  }
  .searchbar input::placeholder{ color:#5c6579; }
  .clear-btn{ background:none; border:none; color:var(--dim); font-size:16px; cursor:pointer; padding:2px 4px; display:none; }

  .tabs{ display:flex; gap:6px; margin-top:10px; }
  .tab{
    flex:1; text-align:center; padding:8px 4px; border-radius:9px; font-size:12.5px;
    font-weight:700; letter-spacing:0.02em; color:var(--dim); background:transparent;
    border:1px solid var(--line); cursor:pointer; transition:all .15s;
  }
  .tab.active{ background:linear-gradient(180deg, rgba(201,161,90,0.22), rgba(201,161,90,0.08)); color:var(--gold-bright); border-color:rgba(201,161,90,0.5); }

  .chiprow{ display:flex; gap:6px; overflow-x:auto; padding:10px 16px 4px; scrollbar-width:none; }
  .chiprow::-webkit-scrollbar{ display:none; }
  .chip{
    flex:none; font-size:12px; padding:6px 12px; border-radius:999px; white-space:nowrap;
    background:var(--panel); border:1px solid var(--line); color:var(--dim); cursor:pointer;
  }
  .chip.active{ background:rgba(201,161,90,0.18); border-color:var(--gold); color:var(--gold-bright); }

  main{ flex:1; padding:6px 16px 90px; }

  .result-count{ font-size:11.5px; color:var(--dim); margin:8px 2px 10px; letter-spacing:0.03em; }

  /* ---- Cards ---- */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel2));
    border:1px solid var(--line); border-radius:14px; margin-bottom:10px; overflow:hidden;
  }
  .card-head{ display:flex; align-items:center; gap:10px; padding:13px 14px; cursor:pointer; }
  .lv-badge{
    flex:none; font-family:'Cinzel',serif; font-weight:700; font-size:11px; color:var(--ink);
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    padding:5px 8px; border-radius:8px; text-align:center; min-width:58px; line-height:1.1;
  }
  .lv-badge small{ display:block; font-size:8px; font-weight:600; opacity:0.75; letter-spacing:0.03em;}
  .card-title{ flex:1; min-width:0; }
  .card-title .area{ font-family:'Noto Serif JP',serif; font-weight:700; font-size:15px; color:var(--parchment); }
  .card-title .monsters-preview{
    font-size:11.5px; color:var(--dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;

  .cdot{ width:8px; height:8px; border-radius:50%; box-shadow: inset 0 0 2px rgba(0,0,0,.4);}
  .chevron{ flex:none; color:var(--dim); transition:transform .2s; }
  .card.open .chevron{ transform:rotate(180deg); }

  .card-body{ display:none; padding:0 14px 16px; border-top:1px solid var(--line); }
  .card.open .card-body{ display:block; }

  .mtable{ width:100%; border-collapse:collapse; margin:12px 0 4px; font-size:12.5px; }
  .mtable th{ text-align:left; color:var(--dim); font-weight:500; font-size:10.5px; padding:0 6px 5px 0; border-bottom:1px solid var(--line); letter-spacing:0.03em;}
  .mtable td{ padding:5px 6px 5px 0; border-bottom:1px solid rgba(196,168,102,0.08); color:var(--parchment); }
  .type-tag{ font-size:10px; padding:2px 6px; border-radius:6px; background:rgba(201,161,90,0.12); color:var(--gold-bright); white-space:nowrap; }

  .spot-line{ display:flex; gap:8px; font-size:12.5px; color:#c9d1e0; margin:10px 0 4px; line-height:1.5;}
  .spot-line .lbl{ color:var(--gold); flex:none; font-weight:700; font-size:11px; padding-top:1px;}
  .maplink{ display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--crystal-water); text-decoration:none; margin:6px 0 2px;}
  .maplink:active{ opacity:0.6; }

  .accordion-mini{ margin-top:10px; border-top:1px dashed var(--line); padding-top:10px;}
  .mini-head{ display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .mini-head span.lbl2{ font-size:11.5px; color:var(--gold-bright); font-weight:700; letter-spacing:0.02em; }
  .mini-chevron{ color:var(--dim); font-size:12px; transition:transform .2s; }
  .mini-body{ display:none; margin-top:8px; font-size:12px; color:#b9c2d4; line-height:1.9; white-space:pre-line; }
  .mini.open .mini-body{ display:block; }
  .mini.open .mini-chevron{ transform:rotate(180deg); }

  .crystal-legend{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .crystal-legend span{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; color:var(--dim); }

  /* ---- Job list ---- */
  .job-group{ margin-bottom:18px; }
  .job-group h3{
    font-family:'Noto Serif JP',serif; font-size:13px; color:var(--gold); margin:0 0 8px 2px;

  .job-link .jd{ font-size:11.5px; color:var(--dim); margin-top:4px; }
  .job-link .jmeta{ font-size:10.5px; color:var(--gold); margin-top:6px; }

  .empty .big{ font-size:15px; color:var(--gold-bright); margin-bottom:6px; font-family:'Noto Serif JP',serif;}

    position:sticky; bottom:0; text-align:center; font-size:10px; color:#4a5164;

    {t:"学者レベル1から99へ", d:"装備処分企画の最終第五弾。残っていた最後のレベル1ジョブ。", url:"https://ff11.you-takai.com/story-of-adventure-321/", date:"2024.08.17"}

/* =========================================================
   STATE & RENDER
   ========================================================= */
let state = { tab:"spots", query:"", tierFilter:"all" };

const mainEl = document.getElementById('main');
const chipRow = document.getElementById('chipRow');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

function buildChips(){
  chipRow.innerHTML = "";
  if(state.tab !== "spots"){ chipRow.style.display="none"; return; }
  chipRow.style.display="flex";
  const chips = [{key:"all", label:"すべて"}].concat(TIERS.map(t=>({key:t.label, label:t.label})));
  chips.forEach(c=>{
    const el = document.createElement('div');
    el.className = "chip" + (state.tierFilter===c.key ? " active":"");
    el.textContent = c.label;
    el.onclick = ()=>{ state.tierFilter = c.key; render(); };
    chipRow.appendChild(el);
  });
}

function matchesQuery(spot, q){
  if(!q) return true;
  q = q.trim().toLowerCase();
  const hay = [
    spot.area, spot.spot, spot.drops, spot.area_tag, spot.unity,
    ...spot.monsters.flatMap(m=>[m[0], m[2], m[1]]),
    String(spot.lvmin), String(spot.lvmax)
  ].join(" ").toLowerCase();
  return hay.includes(q);
}

function crystalDots(crystals){
  return crystals.map(c=>`<span class="cdot" style="background:${CRYSTAL_COLOR[c]||'#666'}" title="${c}のクリスタル"></span>`).join("");
}

function renderSpots(){
  let tiers = TIERS;
  if(state.tierFilter !== "all"){
    tiers = TIERS.filter(t=>t.label===state.tierFilter);
  }
  let cards = [];
  tiers.forEach(tier=>{
    tier.spots.forEach((spot, idx)=>{
      if(matchesQuery(spot, state.query)){
        cards.push({tier, spot, id: tier.label+"-"+idx+"-"+spot.area});
      }
    });
  });

  document.title = "狩場図鑑 — レベル1から99へ";

  if(cards.length===0){
    mainEl.innerHTML = `<div class="empty"><div class="big">見つかりませんでした</div>検索語やレベル帯を変えてお試しください</div>`;
    return;
  }

  const countLabel = state.query ? `「${escapeHtml(state.query)}」の検索結果：${cards.length}件` : `${cards.length}件の狩場`;
  let html = `<div class="result-count">${countLabel}</div>`;

  cards.forEach(({spot, id})=>{
    const monsterPreview = spot.monsters.map(m=>m[0]).join(" / ");
    const rows = spot.monsters.map(m=>`
      <tr><td>${m[0]}</td><td>Lv ${m[1]}</td><td><span class="type-tag">${m[2]}</span></td></tr>
    `).join("");
    const legend = spot.crystals.map(c=>`<span><span class="cdot" style="background:${CRYSTAL_COLOR[c]}"></span>${c}</span>`).join("");
    html += `
    <div class="card" data-id="${id}">
      <div class="card-head" onclick="toggleCard('${id}')">
        <div class="lv-badge">Lv${spot.lvmin}<small>〜${spot.lvmax}</small></div>
        <div class="card-title">
          <div class="area">${spot.area}</div>
          <div class="monsters-preview">${monsterPreview}</div>
        </div>
        <div class="crystal-dots">${crystalDots(spot.crystals)}</div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        <table class="mtable">
          <tr><th>モンスター</th><th>レベル</th><th>種族</th></tr>
          ${rows}
        </table>
        <div class="spot-line"><span class="lbl">狩場</span><span>${spot.spot}</span></div>
        ${spot.map ? `<a class="maplink" href="${spot.map}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
          場所をMAPで見る</a>` : ``}
        <div class="crystal-legend">${legend}</div>
        <div class="accordion-mini" onclick="toggleMini(event, '${id}-eminence')">
          <div class="mini" id="mini-${id}-eminence">
            <div class="mini-head"><span class="lbl2">エミネンス目標（エリア固有・ユニティ）</span><span class="mini-chevron">▾</span></div>
            <div class="mini-body">戦利品：${spot.drops}
エリア別：${spot.area_tag}
ユニティ：${spot.unity}</div>
          </div>
        </div>
      </div>
    </div>`;
  });
  mainEl.innerHTML = html;
}

function renderJobs(){
  document.title = "ジョブ別レベル上げ記事 — 狩場図鑑";
  const q = state.query.trim().toLowerCase();
  let html = "";
  let total = 0;
  JOBS.forEach(g=>{
    const items = g.items.filter(it => !q || (it.t+it.d).toLowerCase().includes(q));
    if(items.length===0) return;
    total += items.length;
    html += `<div class="job-group"><h3>${g.group}</h3>`;
    items.forEach(it=>{
      html += `<a class="job-link" href="${it.url}" target="_blank" rel="noopener">
        <div class="jt">${it.t}</div>
        <div class="jd">${it.d}</div>
        <div class="jmeta">${it.date}</div>
      </a>`;
    });
    html += `</div>`;
  });
  if(total===0){
    mainEl.innerHTML = `<div class="empty"><div class="big">見つかりませんでした</div>検索語を変えてお試しください</div>`;
    return;
  }
  mainEl.innerHTML = `<div class="result-count">全22ジョブのレベル上げ記事：${total}件</div>` + html;
}

function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===state.tab));
  buildChips();
  clearBtn.style.display = state.query ? "inline-block" : "none";
  if(state.tab==="spots") renderSpots(); else renderJobs();
}

function toggleCard(id){
  const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  if(card) card.classList.toggle('open');
}
function toggleMini(ev, id){
  ev.stopPropagation();
  const mini = document.getElementById('mini-'+id);
  if(mini) mini.classList.toggle('open');
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{ state.tab = t.dataset.tab; state.tierFilter="all"; render(); });
});
searchInput.addEventListener('input', (e)=>{ state.query = e.target.value; render(); });
clearBtn.addEventListener('click', ()=>{ searchInput.value=""; state.query=""; render(); searchInput.focus(); });

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
